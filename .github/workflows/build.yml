name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Build IPA
        run: |
          xcodebuild -project FyntrixAI.xcodeproj \
            -scheme FyntrixAI \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/FyntrixAI.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          mkdir -p Payload
          cp -r ./build/FyntrixAI.xcarchive/Products/Applications/FyntrixAI.app Payload/
          zip -r FyntrixAI.ipa Payload
          rm -rf Payload
      
      - uses: actions/upload-artifact@v4
        with:
          name: FyntrixAI-iOS
          path: FyntrixAI.ipa
