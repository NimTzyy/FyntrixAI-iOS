name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          set -ex
          
          echo "=== Verify project ==="
          ls -la FyntrixAI/
          ls -la FyntrixAI/Views/
          
          echo "=== Build ==="
          xcodebuild build \
            -project FyntrixAI.xcodeproj \
            -scheme FyntrixAI \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          
          echo "=== Archive ==="
          xcodebuild archive \
            -project FyntrixAI.xcodeproj \
            -scheme FyntrixAI \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/FyntrixAI.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          
          echo "=== Package IPA ==="
          mkdir -p Payload
          cp -r ./build/FyntrixAI.xcarchive/Products/Applications/FyntrixAI.app Payload/
          zip -r FyntrixAI.ipa Payload
          ls -lh FyntrixAI.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: FyntrixAI-iOS
          path: FyntrixAI.ipa
